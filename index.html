<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; color: #333; }
        .producto-card { border: 1px solid #ddd; padding: 20px; border-radius: 8px; max-width: 400px; box-shadow: 2px 2px 10px #eee; }
        .precio { color: #B12704; font-size: 1.5em; font-weight: bold; }
        .disponible { color: #008a00; font-weight: bold; }
        .btn-compra { background-color: #FF9900; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="producto-card">
        <h2>Diccionario Español Colombiano (Edición Escolar)</h2>
        <p>Aprende jerga, modismos y cultura colombiana con esta guía definitiva.</p>
        
        <div class="precio">$ 35.000 COP</div>
        <p class="disponible">✓ Disponible en stock</p>
        
        <p><strong>Tiempo de entrega:</strong> 3-5 días hábiles</p>
        <p><strong>Envío:</strong> Gratis a todo el país</p>
        
        <button class="btn-compra">Añadir al carrito</button>
    </div>

</body>
</html>
